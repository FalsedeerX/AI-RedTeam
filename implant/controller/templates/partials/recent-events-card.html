<div class="card shadow-sm d-flex flex-column flex-grow-1 overflow-hidden">

    <div class="card-header flex-shrink-0">
        <h2 class="h4 text-secondary mb-0">
            <i class="bi bi-activity me-1"></i>
            Recent Events
        </h2>
    </div>

    <div class="card-body d-flex flex-column flex-grow-1 overflow-hidden p-0">

        <!-- Summary -->
        <div class="row text-center border-bottom border-2 py-3 mx-0 flex-shrink-0" id="event-summary">
            <div class="col">
                <div class="fw-bold text-info fs-4" id="event-warning-count">0</div>
                <small class="text-muted">
                    <i class="bi bi-cone-striped me-1"></i>Warnings
                </small>
            </div>
            <div class="col">
                <div class="fw-bold text-warning fs-4" id="event-error-count">0</div>
                <small class="text-muted">
                    <i class="bi bi-exclamation-triangle-fill me-1"></i>Errors
                </small>
            </div>
            <div class="col">
                <div class="fw-bold text-danger fs-4" id="event-critical-count">0</div>
                <small class="text-muted">
                    <i class="bi bi-x-octagon-fill me-1"></i>Criticals
                </small>
            </div>
        </div>

        <!-- Scrollable log list -->
        <div class="flex-grow-1 overflow-y-auto">
            <ul class="list-group list-group-flush" id="recent-events">
            </ul>
        </div>

    </div>
</div>
